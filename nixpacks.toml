[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install --include=dev --prefix shared && npm install --include=dev --prefix backend && npm install --include=dev --prefix frontend",
  ]

  [phases.build]
  cmds = [
    "npm run build --prefix frontend",
    ]

    [start]
    cmd = "NODE_ENV=production node backend/src/index.js"
